<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>孙志凡 · HRBP智能工作台 · 简历可视化看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#f5f2ed;font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    display:flex;justify-content:center;align-items:center;min-height:100vh;
    padding:20px;
}
.card{
    background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.08);
    padding:40px;text-align:center;max-width:420px;width:100%;
}
.card .avatar{font-size:48px;margin-bottom:8px}
.card h1{font-size:22px;color:#1a1a1a;margin-bottom:4px}
.card .subtitle{font-size:14px;color:#888;margin-bottom:4px}
.card .badge{
    display:inline-block;background:#e8f5e9;color:#2e7d32;
    font-size:12px;padding:2px 10px;border-radius:12px;margin-bottom:20px;
}
.card .qr-wrap{
    background:#fff;border:2px solid #eee;border-radius:12px;
    padding:16px;display:inline-block;margin-bottom:20px;
}
.card .qr-wrap img{width:260px;height:260px;display:block}
.card .url{
    font-size:13px;color:#666;background:#f5f2ed;
    padding:8px 16px;border-radius:8px;word-break:break-all;
    margin-bottom:16px;
}
.card .tip{
    font-size:12px;color:#aaa;line-height:1.5;
}
.btn{
    display:inline-block;padding:10px 24px;border-radius:8px;
    background:#1a1a1a;color:#fff;text-decoration:none;
    font-size:14px;margin-top:8px;transition:opacity .2s;
}
.btn:hover{opacity:.8}
</style>
</head>
<body>
<div class="card">
    <div class="avatar">👩‍💼</div>
    <h1>孙志凡 · 简历可视化看板</h1>
    <div class="subtitle">HRBP智能工作台 · 项目成果展示</div>
    <div class="badge">📱 扫码即可查看</div>
    <div class="qr-wrap">
        <img src="简历可视化看板_二维码.png" alt="扫码查看简历可视化看板">
    </div>
    <div class="url">https://799843750-max.github.io/resume/</div>
    <div class="tip">📱 用手机相机 / 微信扫一扫即可打开<br>也可截图保存到相册</div>
    <a class="btn" href="https://799843750-max.github.io/resume/" target="_blank">🔗 在浏览器中打开</a>
</div>
</body>
</html>
